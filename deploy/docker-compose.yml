# InfraSense Platform - Legacy Deploy Directory Compose
# NOTE: The canonical docker-compose.yml is now at the project root (infrasense/).
# Run from the project root: docker compose up -d
# This file is kept for reference only.
#
# If running from this directory:
#   docker compose --env-file ../.env up -d

services:
  postgres:
    image: postgres:15-alpine
    container_name: infrasense-postgres
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: infrasense
      POSTGRES_USER: infrasense
      POSTGRES_PASSWORD: ${DB_PASSWORD:-InfraSense@2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infrasense"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - infrasense

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.99.0
    container_name: infrasense-victoriametrics
    restart: unless-stopped
    command:
      - "--storageDataPath=/victoria-metrics-data"
      - "--retentionPeriod=90d"
      - "--httpListenAddr=0.0.0.0:8428"
    ports:
      - "8428:8428"
    volumes:
      - victoriametrics_data:/victoria-metrics-data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8428/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - infrasense

  loki:
    image: grafana/loki:2.9.6
    container_name: infrasense-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/config.yml
    volumes:
      - loki_data:/loki
      - ./loki/loki-config.yml:/etc/loki/config.yml:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - infrasense

  promtail:
    image: grafana/promtail:2.9.6
    container_name: infrasense-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./promtail:/etc/promtail
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9080/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - infrasense
    depends_on:
      loki:
        condition: service_started

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: infrasense-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - ./prometheus/targets:/etc/prometheus/targets:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - infrasense
    depends_on:
      victoriametrics:
        condition: service_started
      alertmanager:
        condition: service_started

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: infrasense-alertmanager
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - alertmanager_data:/alertmanager
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - infrasense

  notification-service:
    build:
      context: ../notification-service
      dockerfile: Dockerfile
    image: infrasense-notification-service:1.0.0
    container_name: infrasense-notification-service
    restart: unless-stopped
    env_file:
      - ../.env
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - infrasense

  grafana:
    image: grafana/grafana:10.4.1
    container_name: infrasense-grafana
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: http://${DOMAIN:-localhost}/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - infrasense
    depends_on:
      victoriametrics:
        condition: service_started
      loki:
        condition: service_started

  redfish-collector:
    build:
      context: ../collectors/redfish-collector
      dockerfile: Dockerfile
    image: infrasense-redfish-collector:1.0.0
    container_name: infrasense-redfish-collector
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DB_HOST: postgres
      DB_PASSWORD: ${DB_PASSWORD:-InfraSense@2024}
      VICTORIAMETRICS_URL: http://victoriametrics:8428/api/v1/write
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-supersecretenckeythatis32charslo}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - infrasense
    depends_on:
      postgres:
        condition: service_healthy
      victoriametrics:
        condition: service_started

  api-server:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: infrasense-backend:1.0.0
    container_name: infrasense-api-server
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: infrasense
      DB_USER: infrasense
      DB_PASSWORD: ${DB_PASSWORD:-InfraSense@2024}
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkeythatis32charslo}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-supersecretenckeythatis32charslo}
      VICTORIAMETRICS_URL: http://victoriametrics:8428/api/v1/write
      LOG_LEVEL: info
      LOG_FORMAT: json
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - infrasense
    depends_on:
      postgres:
        condition: service_healthy
      victoriametrics:
        condition: service_started

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    image: infrasense-frontend:1.0.0
    container_name: infrasense-frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - infrasense
    depends_on:
      api-server:
        condition: service_healthy

  nginx:
    image: nginx:1.25-alpine
    container_name: infrasense-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - infrasense
    depends_on:
      api-server:
        condition: service_healthy
      grafana:
        condition: service_started
      frontend:
        condition: service_started

volumes:
  postgres_data:
    driver: local
  victoriametrics_data:
    driver: local
  loki_data:
    driver: local
  alertmanager_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  infrasense:
    driver: bridge
