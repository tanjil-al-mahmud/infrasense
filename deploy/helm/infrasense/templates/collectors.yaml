{{- $ns := include "infrasense.namespace" . }}
{{- $tag := .Values.global.imageTag }}
{{- $prefix := .Values.imagePrefix }}
{{- $pullPolicy := .Values.global.imagePullPolicy }}
{{- $labels := include "infrasense.labels" . }}

{{- range $name, $cfg := .Values.collectors }}
{{- if $cfg.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}-collector
  namespace: {{ $ns }}
  labels:
    {{- $labels | nindent 4 }}
    app: {{ $name }}-collector
    component: collector
spec:
  replicas: {{ $cfg.replicas }}
  selector:
    matchLabels:
      app: {{ $name }}-collector
  template:
    metadata:
      labels:
        app: {{ $name }}-collector
        component: collector
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: {{ $name }}-collector
          image: {{ $prefix }}{{ $cfg.image }}:{{ $tag }}
          imagePullPolicy: {{ $pullPolicy }}
          ports:
            - containerPort: {{ $cfg.port }}
              name: health
          env:
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: infrasense-db-secret
                  key: db-name
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: infrasense-db-secret
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: infrasense-db-secret
                  key: db-password
            - name: VICTORIAMETRICS_URL
              value: http://victoriametrics:8428/api/v1/write
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: infrasense-app-secret
                  key: encryption-key
            - name: LOG_LEVEL
              value: info
            - name: LOG_FORMAT
              value: json
          livenessProbe:
            httpGet:
              path: /health
              port: {{ $cfg.port }}
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: {{ $cfg.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml $cfg.resources | nindent 12 }}
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}-collector
  namespace: {{ $ns }}
  labels:
    {{- $labels | nindent 4 }}
    app: {{ $name }}-collector
    component: collector
spec:
  selector:
    app: {{ $name }}-collector
  ports:
    - name: health
      port: {{ $cfg.port }}
      targetPort: {{ $cfg.port }}
      protocol: TCP
  type: ClusterIP
{{- end }}
{{- end }}
