apiVersion: v1
kind: ConfigMap
metadata:
  name: infrasense-config
  namespace: {{ include "infrasense.namespace" . }}
  labels:
    {{- include "infrasense.labels" . | nindent 4 }}
    app: infrasense
    component: config
data:
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: {{ .Values.postgres.database | quote }}
  VICTORIAMETRICS_URL: "http://victoriametrics:8428/api/v1/write"
  VICTORIAMETRICS_QUERY_URL: "http://victoriametrics:8428"
  REDIS_URL: "redis://redis:6379"
  LOG_LEVEL: {{ .Values.apiServer.env.logLevel | quote }}
  LOG_FORMAT: {{ .Values.apiServer.env.logFormat | quote }}
  API_PORT: "8080"
  API_BASE_PATH: "/api/v1"
  POLLING_INTERVAL: "60s"
  RELOAD_INTERVAL: "5m"
  MAX_RETRY_INTERVAL: "10m"
  HEALTH_PORT: "8080"
  HEALTH_PATH: "/health"
  ALERTMANAGER_URL: "http://alertmanager:9093"
  PROMETHEUS_URL: "http://prometheus:9090"
  LOKI_URL: "http://loki:3100"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: infrasense-collector-config
  namespace: {{ include "infrasense.namespace" . }}
  labels:
    {{- include "infrasense.labels" . | nindent 4 }}
    app: infrasense
    component: config
data:
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: {{ .Values.postgres.database | quote }}
  VICTORIAMETRICS_URL: "http://victoriametrics:8428/api/v1/write"
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
  POLLING_INTERVAL: "60s"
  RELOAD_INTERVAL: "5m"
  MAX_RETRY_INTERVAL: "10m"
  MAX_CONCURRENT_POLLS: "100"
