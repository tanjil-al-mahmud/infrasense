{{- if .Values.discoveryEngine.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: discovery-engine
  namespace: {{ include "infrasense.namespace" . }}
  labels:
    {{- include "infrasense.labels" . | nindent 4 }}
    app: discovery-engine
    component: backend
spec:
  replicas: {{ .Values.discoveryEngine.replicas }}
  selector:
    matchLabels:
      app: discovery-engine
  template:
    metadata:
      labels:
        app: discovery-engine
        component: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: discovery-engine
          image: {{ .Values.imagePrefix }}{{ .Values.discoveryEngine.image }}:{{ .Values.global.imageTag }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.discoveryEngine.port }}
              name: http
          env:
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: infrasense-db-secret
                  key: db-name
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: infrasense-db-secret
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: infrasense-db-secret
                  key: db-password
            - name: LOG_LEVEL
              value: {{ .Values.discoveryEngine.env.logLevel }}
            - name: LOG_FORMAT
              value: {{ .Values.discoveryEngine.env.logFormat }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.discoveryEngine.port }}
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.discoveryEngine.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.discoveryEngine.resources | nindent 12 }}
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: discovery-engine
  namespace: {{ include "infrasense.namespace" . }}
  labels:
    {{- include "infrasense.labels" . | nindent 4 }}
    app: discovery-engine
    component: backend
spec:
  selector:
    app: discovery-engine
  ports:
    - name: http
      port: {{ .Values.discoveryEngine.port }}
      targetPort: {{ .Values.discoveryEngine.port }}
      protocol: TCP
  type: ClusterIP
{{- end }}
