# NOTE: Set secret values via --set secrets.* or a separate values file.
# Never commit real secret values to version control.
---
apiVersion: v1
kind: Secret
metadata:
  name: infrasense-app-secret
  namespace: {{ include "infrasense.namespace" . }}
  labels:
    {{- include "infrasense.labels" . | nindent 4 }}
type: Opaque
data:
  jwt-secret: {{ .Values.secrets.jwtSecret | b64enc | quote }}
  encryption-key: {{ .Values.secrets.encryptionKey | b64enc | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: infrasense-db-secret
  namespace: {{ include "infrasense.namespace" . }}
  labels:
    {{- include "infrasense.labels" . | nindent 4 }}
type: Opaque
data:
  db-name: {{ .Values.postgres.database | b64enc | quote }}
  db-user: {{ .Values.postgres.user | b64enc | quote }}
  db-password: {{ .Values.secrets.dbPassword | b64enc | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: infrasense-postgres-secret
  namespace: {{ include "infrasense.namespace" . }}
  labels:
    {{- include "infrasense.labels" . | nindent 4 }}
type: Opaque
data:
  username: {{ .Values.postgres.user | b64enc | quote }}
  password: {{ .Values.secrets.dbPassword | b64enc | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: infrasense-redis-secret
  namespace: {{ include "infrasense.namespace" . }}
  labels:
    {{- include "infrasense.labels" . | nindent 4 }}
type: Opaque
data:
  password: {{ .Values.secrets.redisPassword | b64enc | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: infrasense-notification-secret
  namespace: {{ include "infrasense.namespace" . }}
  labels:
    {{- include "infrasense.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.secrets.smtpHost }}
  smtp-host: {{ .Values.secrets.smtpHost | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.smtpPort }}
  smtp-port: {{ .Values.secrets.smtpPort | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.smtpUsername }}
  smtp-username: {{ .Values.secrets.smtpUsername | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.smtpPassword }}
  smtp-password: {{ .Values.secrets.smtpPassword | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.smtpFrom }}
  smtp-from: {{ .Values.secrets.smtpFrom | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.telegramBotToken }}
  telegram-bot-token: {{ .Values.secrets.telegramBotToken | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.telegramChatId }}
  telegram-chat-id: {{ .Values.secrets.telegramChatId | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.slackWebhookUrl }}
  slack-webhook-url: {{ .Values.secrets.slackWebhookUrl | b64enc | quote }}
  {{- end }}
