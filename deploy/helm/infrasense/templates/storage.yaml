{{- $ns := include "infrasense.namespace" . }}
{{- $labels := include "infrasense.labels" . }}

# ─── PostgreSQL ───────────────────────────────────────────────────────────────
{{- if .Values.postgres.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: {{ $ns }}
  labels:
    {{- $labels | nindent 4 }}
    app: postgres
    component: storage
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - port: 5432
      name: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: {{ $ns }}
  labels:
    {{- $labels | nindent 4 }}
    app: postgres
    component: storage
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        component: storage
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database }}
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: infrasense-postgres-secret
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: infrasense-postgres-secret
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)", "-d", "$(POSTGRES_DB)"]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)", "-d", "$(POSTGRES_DB)"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
        labels:
          app: postgres
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.postgres.storageClassName }}
        storageClassName: {{ .Values.postgres.storageClassName }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgres.storage }}
{{- end }}

# ─── VictoriaMetrics ──────────────────────────────────────────────────────────
{{- if .Values.victoriametrics.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: victoriametrics
  namespace: {{ $ns }}
  labels:
    {{- $labels | nindent 4 }}
    app: victoriametrics
    component: storage
spec:
  clusterIP: None
  selector:
    app: victoriametrics
  ports:
    - port: 8428
      name: http
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: victoriametrics
  namespace: {{ $ns }}
  labels:
    {{- $labels | nindent 4 }}
    app: victoriametrics
    component: storage
spec:
  serviceName: victoriametrics
  replicas: 1
  selector:
    matchLabels:
      app: victoriametrics
  template:
    metadata:
      labels:
        app: victoriametrics
        component: storage
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: victoriametrics
          image: {{ .Values.victoriametrics.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          args:
            - -storageDataPath=/storage
            - -retentionPeriod={{ .Values.victoriametrics.retentionPeriod }}
            - -httpListenAddr=:8428
          ports:
            - containerPort: 8428
              name: http
          livenessProbe:
            httpGet:
              path: /health
              port: 8428
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8428
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.victoriametrics.resources | nindent 12 }}
          volumeMounts:
            - name: victoriametrics-data
              mountPath: /storage
  volumeClaimTemplates:
    - metadata:
        name: victoriametrics-data
        labels:
          app: victoriametrics
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.victoriametrics.storageClassName }}
        storageClassName: {{ .Values.victoriametrics.storageClassName }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.victoriametrics.storage }}
{{- end }}

# ─── Redis ────────────────────────────────────────────────────────────────────
{{- if .Values.redis.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: {{ $ns }}
  labels:
    {{- $labels | nindent 4 }}
    app: redis
    component: storage
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      name: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: {{ $ns }}
  labels:
    {{- $labels | nindent 4 }}
    app: redis
    component: storage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        component: storage
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          args:
            - redis-server
            - --requirepass
            - $(REDIS_PASSWORD)
            - --maxmemory
            - {{ .Values.redis.maxmemory }}
            - --maxmemory-policy
            - allkeys-lru
          ports:
            - containerPort: 6379
              name: redis
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: infrasense-redis-secret
                  key: password
          livenessProbe:
            exec:
              command: ["redis-cli", "-a", "$(REDIS_PASSWORD)", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["redis-cli", "-a", "$(REDIS_PASSWORD)", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          emptyDir: {}
      restartPolicy: Always
{{- end }}
