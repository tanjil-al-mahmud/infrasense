apiVersion: v1
kind: Service
metadata:
  name: proxmox-collector
  namespace: infrasense
  labels:
    app: proxmox-collector
    component: collector
spec:
  selector:
    app: proxmox-collector
  ports:
    - name: health
      port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
