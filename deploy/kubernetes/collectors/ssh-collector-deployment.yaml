apiVersion: apps/v1
kind: Deployment
metadata:
  name: ssh-collector
  namespace: infrasense
  labels:
    app: ssh-collector
    component: collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ssh-collector
  template:
    metadata:
      labels:
        app: ssh-collector
        component: collector
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: ssh-collector
          image: infrasense-ssh-collector:1.0.0
          ports:
            - containerPort: 8080
              name: health
          env:
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: infrasense-db-secret
                  key: db-name
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: infrasense-db-secret
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: infrasense-db-secret
                  key: db-password
            - name: VICTORIAMETRICS_URL
              value: http://victoriametrics:8428/api/v1/write
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: infrasense-app-secret
                  key: encryption-key
            - name: LOG_LEVEL
              value: info
            - name: LOG_FORMAT
              value: json
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      restartPolicy: Always
