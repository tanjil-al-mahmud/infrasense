# IMPORTANT: This file is a TEMPLATE only. Do NOT commit real secret values to version control.
# Replace all placeholder values with base64-encoded secrets before applying.
# Generate base64 values with: echo -n 'your-value' | base64
#
# Required secrets before deploying:
#   DB_PASSWORD:      PostgreSQL password for the infrasense user
#   JWT_SECRET:       Random 64-byte string for JWT signing (e.g. openssl rand -hex 64)
#   ENCRYPTION_KEY:   Exactly 32 bytes for AES-256-GCM credential encryption (e.g. openssl rand -hex 32)
#
# Apply with: kubectl apply -f secrets.yaml -n infrasense
---
apiVersion: v1
kind: Secret
metadata:
  name: infrasense-app-secret
  namespace: infrasense
  labels:
    app: infrasense
    component: config
type: Opaque
data:
  # base64-encoded JWT signing secret (min 64 bytes recommended)
  # Replace with: echo -n 'your-jwt-secret' | base64
  jwt-secret: REPLACE_WITH_BASE64_JWT_SECRET

  # base64-encoded AES-256-GCM encryption key (must be exactly 32 bytes)
  # Replace with: openssl rand -base64 32
  encryption-key: REPLACE_WITH_BASE64_ENCRYPTION_KEY
---
apiVersion: v1
kind: Secret
metadata:
  name: infrasense-db-secret
  namespace: infrasense
  labels:
    app: infrasense
    component: config
type: Opaque
data:
  # base64-encoded PostgreSQL credentials
  # Replace with: echo -n 'infrasense' | base64
  db-name: aW5mcmFzZW5zZQ==
  # Replace with: echo -n 'infrasense' | base64
  db-user: aW5mcmFzZW5zZQ==
  # Replace with: echo -n 'your-db-password' | base64
  db-password: REPLACE_WITH_BASE64_DB_PASSWORD
---
apiVersion: v1
kind: Secret
metadata:
  name: infrasense-postgres-secret
  namespace: infrasense
  labels:
    app: infrasense
    component: config
type: Opaque
data:
  # base64-encoded PostgreSQL superuser credentials
  # Replace with: echo -n 'infrasense' | base64
  username: aW5mcmFzZW5zZQ==
  # Replace with: echo -n 'your-db-password' | base64
  password: REPLACE_WITH_BASE64_DB_PASSWORD
---
apiVersion: v1
kind: Secret
metadata:
  name: infrasense-redis-secret
  namespace: infrasense
  labels:
    app: infrasense
    component: config
type: Opaque
data:
  # base64-encoded Redis password
  # Replace with: echo -n 'your-redis-password' | base64
  password: REPLACE_WITH_BASE64_REDIS_PASSWORD
---
apiVersion: v1
kind: Secret
metadata:
  name: infrasense-notification-secret
  namespace: infrasense
  labels:
    app: infrasense
    component: config
type: Opaque
data:
  # SMTP configuration (all optional - omit keys not in use)
  # smtp-host: REPLACE_WITH_BASE64_SMTP_HOST
  # smtp-port: REPLACE_WITH_BASE64_SMTP_PORT
  # smtp-username: REPLACE_WITH_BASE64_SMTP_USERNAME
  # smtp-password: REPLACE_WITH_BASE64_SMTP_PASSWORD
  # smtp-from: REPLACE_WITH_BASE64_SMTP_FROM

  # Telegram Bot (optional)
  # telegram-bot-token: REPLACE_WITH_BASE64_TELEGRAM_BOT_TOKEN
  # telegram-chat-id: REPLACE_WITH_BASE64_TELEGRAM_CHAT_ID

  # Slack Webhook (optional)
  # slack-webhook-url: REPLACE_WITH_BASE64_SLACK_WEBHOOK_URL
