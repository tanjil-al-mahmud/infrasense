apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: infrasense
  labels:
    app: notification-service
    component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
        component: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: notification-service
          image: infrasense-notification-service:1.0.0
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: infrasense-notification-secret
                  key: smtp-host
                  optional: true
            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: infrasense-notification-secret
                  key: smtp-port
                  optional: true
            - name: SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: infrasense-notification-secret
                  key: smtp-username
                  optional: true
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: infrasense-notification-secret
                  key: smtp-password
                  optional: true
            - name: SMTP_FROM
              valueFrom:
                secretKeyRef:
                  name: infrasense-notification-secret
                  key: smtp-from
                  optional: true
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: infrasense-notification-secret
                  key: telegram-bot-token
                  optional: true
            - name: TELEGRAM_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: infrasense-notification-secret
                  key: telegram-chat-id
                  optional: true
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: infrasense-notification-secret
                  key: slack-webhook-url
                  optional: true
            - name: LOG_LEVEL
              value: info
            - name: LOG_FORMAT
              value: json
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      restartPolicy: Always
