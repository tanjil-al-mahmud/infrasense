groups:
  - name: hardware_critical_alerts
    interval: 30s
    rules:
      # PSU failure alerts - CRITICAL
      - alert: PSUFailure
        expr: (infrasense_ipmi_psu_status == 0) or (infrasense_redfish_psu_status == 0)
        for: 1m
        labels:
          severity: critical
          category: hardware
        annotations:
          summary: "PSU failure detected on device {{ $labels.device_id }}"
          description: "PSU {{ $labels.sensor_name }} on device {{ $labels.device_id }} has failed (status={{ $value }})"
          device_id: "{{ $labels.device_id }}"
          metric_name: "psu_status"

      # Fan speed threshold alerts - CRITICAL
      - alert: FanSpeedCriticalLow
        expr: (infrasense_ipmi_fan_speed_rpm < 1000) or (infrasense_redfish_fan_speed_rpm < 1000)
        for: 2m
        labels:
          severity: critical
          category: hardware
        annotations:
          summary: "Critical low fan speed on device {{ $labels.device_id }}"
          description: "Fan {{ $labels.sensor_name }} on device {{ $labels.device_id }} is running at {{ $value }} RPM (threshold: 1000 RPM)"
          device_id: "{{ $labels.device_id }}"
          metric_name: "fan_speed_rpm"
          current_value: "{{ $value }}"

      # Disk SMART failure alerts - CRITICAL
      - alert: DiskSMARTFailure
        expr: infrasense_redfish_disk_smart_status == 0
        for: 1m
        labels:
          severity: critical
          category: storage
        annotations:
          summary: "Disk SMART failure on device {{ $labels.device_id }}"
          description: "Disk {{ $labels.sensor_name }} on device {{ $labels.device_id }} has SMART failure (status={{ $value }})"
          device_id: "{{ $labels.device_id }}"
          metric_name: "disk_smart_status"

      # RAID controller degraded alerts - CRITICAL
      - alert: RAIDControllerDegraded
        expr: infrasense_redfish_raid_status != 1
        for: 1m
        labels:
          severity: critical
          category: storage
        annotations:
          summary: "RAID controller degraded on device {{ $labels.device_id }}"
          description: "RAID controller {{ $labels.sensor_name }} on device {{ $labels.device_id }} is degraded or failed (status={{ $value }})"
          device_id: "{{ $labels.device_id }}"
          metric_name: "raid_status"

  - name: temperature_warning_alerts
    interval: 1m
    rules:
      # CPU temperature threshold alerts - WARNING
      - alert: CPUTemperatureHigh
        expr: |
          (infrasense_ipmi_temperature_cpu_celsius > 80) or
          (infrasense_redfish_temperature_cpu_celsius > 80)
        for: 5m
        labels:
          severity: warning
          category: temperature
        annotations:
          summary: "High CPU temperature on device {{ $labels.device_id }}"
          description: "CPU temperature on device {{ $labels.device_id }} is {{ $value }}°C (threshold: 80°C)"
          device_id: "{{ $labels.device_id }}"
          metric_name: "temperature_cpu_celsius"
          current_value: "{{ $value }}"

      # CPU temperature critical - CRITICAL
      - alert: CPUTemperatureCritical
        expr: |
          (infrasense_ipmi_temperature_cpu_celsius > 90) or
          (infrasense_redfish_temperature_cpu_celsius > 90)
        for: 2m
        labels:
          severity: critical
          category: temperature
        annotations:
          summary: "Critical CPU temperature on device {{ $labels.device_id }}"
          description: "CPU temperature on device {{ $labels.device_id }} is {{ $value }}°C (critical threshold: 90°C)"
          device_id: "{{ $labels.device_id }}"
          metric_name: "temperature_cpu_celsius"
          current_value: "{{ $value }}"

      # System temperature threshold alerts - WARNING
      - alert: SystemTemperatureHigh
        expr: |
          (infrasense_ipmi_temperature_system_celsius > 45) or
          (infrasense_redfish_temperature_system_celsius > 45)
        for: 5m
        labels:
          severity: warning
          category: temperature
        annotations:
          summary: "High system temperature on device {{ $labels.device_id }}"
          description: "System temperature on device {{ $labels.device_id }} is {{ $value }}°C (threshold: 45°C)"
          device_id: "{{ $labels.device_id }}"
          metric_name: "temperature_system_celsius"
          current_value: "{{ $value }}"

      # Inlet temperature high - WARNING
      - alert: InletTemperatureHigh
        expr: |
          (infrasense_ipmi_temperature_inlet_celsius > 35) or
          (infrasense_redfish_temperature_inlet_celsius > 35)
        for: 5m
        labels:
          severity: warning
          category: temperature
        annotations:
          summary: "High inlet temperature on device {{ $labels.device_id }}"
          description: "Inlet temperature on device {{ $labels.device_id }} is {{ $value }}°C (threshold: 35°C)"
          device_id: "{{ $labels.device_id }}"
          metric_name: "temperature_inlet_celsius"
          current_value: "{{ $value }}"

  - name: device_availability_alerts
    interval: 1m
    rules:
      # Device unavailable - WARNING
      - alert: DeviceUnavailable
        expr: |
          (time() - infrasense_collector_last_success_time) > 600
        for: 5m
        labels:
          severity: warning
          category: availability
        annotations:
          summary: "Device {{ $labels.device_id }} is unavailable"
          description: "Device {{ $labels.device_id }} has not been successfully polled for more than 10 minutes"
          device_id: "{{ $labels.device_id }}"

  - name: collector_health_alerts
    interval: 1m
    rules:
      # Collector unhealthy - WARNING
      - alert: CollectorUnhealthy
        expr: up{job=~".*-collector"} == 0
        for: 10m
        labels:
          severity: warning
          category: collector
        annotations:
          summary: "Collector {{ $labels.job }} is unhealthy"
          description: "Collector {{ $labels.job }} has been down for more than 10 minutes"

  - name: voltage_alerts
    interval: 1m
    rules:
      # Voltage out of range - WARNING
      - alert: VoltageOutOfRange
        expr: |
          (infrasense_ipmi_voltage < 11 or infrasense_ipmi_voltage > 13) or
          (infrasense_redfish_voltage < 11 or infrasense_redfish_voltage > 13)
        for: 5m
        labels:
          severity: warning
          category: power
        annotations:
          summary: "Voltage out of range on device {{ $labels.device_id }}"
          description: "Voltage {{ $labels.sensor_name }} on device {{ $labels.device_id }} is {{ $value }}V (expected: 11-13V)"
          device_id: "{{ $labels.device_id }}"
          metric_name: "voltage"
          current_value: "{{ $value }}"

  - name: network_interface_alerts
    interval: 1m
    rules:
      # Network interface error threshold - WARNING
      - alert: NetworkInterfaceErrorsHigh
        expr: infrasense_ssh_network_errors_total > 100
        for: 5m
        labels:
          severity: warning
          category: network
        annotations:
          summary: "High network interface errors on device {{ $labels.device_id }}"
          description: "Network interface {{ $labels.interface }} on device {{ $labels.device_id }} has {{ $value }} errors (threshold: 100 per polling interval)"
          device_id: "{{ $labels.device_id }}"
          metric_name: "network_errors_total"
          current_value: "{{ $value }}"

  - name: power_consumption_alerts
    interval: 5m
    rules:
      # High power consumption - INFO
      - alert: PowerConsumptionHigh
        expr: infrasense_redfish_power_watts > 500
        for: 30m
        labels:
          severity: info
          category: power
        annotations:
          summary: "High power consumption on device {{ $labels.device_id }}"
          description: "Power consumption on device {{ $labels.device_id }} is {{ $value }}W (threshold: 500W)"
          device_id: "{{ $labels.device_id }}"
          metric_name: "power_watts"
          current_value: "{{ $value }}"
